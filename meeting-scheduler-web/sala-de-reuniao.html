<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Reunião</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:wght@600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --board-bg:#3c3c3e;
    --panel-bg:#48484b;
    --panel-bg-2:#555558;
    --line:rgba(244,242,237,0.12);
    --line-strong:rgba(244,242,237,0.24);
    --paper:#f4f2ed;
    --paper-dim:#9aa0ad;
    --paper-dimmer:#6b7280;
    --amber:#f2a93b;
    --amber-soft:rgba(242,169,59,0.16);
    --mint:#4ade80;
    --mint-soft:rgba(74,222,128,0.14);
    --coral:#ff5e5b;
    --coral-soft:rgba(255,94,91,0.14);
    --radius:14px;
    --hour-w:64px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--board-bg);
    color:var(--paper);
    font-family:'Manrope',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100%;
  }

  .app{
    max-width:880px;
    margin:0 auto;
    padding:28px 20px 60px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  /* ---------- HEADER ---------- */
  .board-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--line-strong);
    padding-bottom:14px;
  }
  .board-id{
    font-family:'Big Shoulders',sans-serif;
    font-weight:800;
    font-size:clamp(22px,5vw,30px);
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--paper);
  }
  .board-id span{color:var(--amber);}
  .clock{
    font-family:'JetBrains Mono',monospace;
    font-size:clamp(16px,4vw,20px);
    color:var(--paper-dim);
    font-weight:500;
    letter-spacing:0.02em;
  }

  /* ---------- STATUS HERO ---------- */
  .status-hero{
    background:var(--panel-bg);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    perspective:600px;
  }
  .status-flap{overflow:hidden;}
  .status-text{
    display:block;
    font-family:'Big Shoulders',sans-serif;
    font-weight:800;
    font-size:clamp(34px,9vw,52px);
    letter-spacing:0.03em;
    line-height:1;
    transform-origin:top center;
  }
  .status-text.free{color:var(--mint);}
  .status-text.occupied{color:var(--coral);}
  .status-text.neutral{color:var(--paper-dim);}
  @keyframes flapIn{
    0%{transform:rotateX(90deg);opacity:0;}
    55%{transform:rotateX(-12deg);opacity:1;}
    100%{transform:rotateX(0deg);opacity:1;}
  }
  .status-text.flap-anim{animation:flapIn .5s ease;}
  .status-detail{
    font-size:14px;
    color:var(--paper-dim);
    text-align:right;
    line-height:1.5;
    max-width:320px;
  }
  .status-detail strong{color:var(--paper);font-weight:600;}

  /* ---------- DAY NAV ---------- */
  .day-nav{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .day-nav button{
    background:var(--panel-bg);
    border:1px solid var(--line);
    color:var(--paper);
    width:34px;height:34px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s, border-color .15s;
  }
  .day-nav button:hover{background:var(--panel-bg-2);border-color:var(--line-strong);}
  .day-nav button:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
  .day-label{
    flex:1;
    font-weight:600;
    font-size:15px;
    text-transform:capitalize;
    color:var(--paper);
  }
  #todayBtn{
    width:auto;
    padding:0 14px;
    font-family:'Manrope',sans-serif;
    font-size:13px;
    font-weight:600;
    color:var(--paper-dim);
  }

  /* ---------- SALA SELECTOR ---------- */
  .sala-selector{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .sala-selector label{
    font-size:13px;
    color:var(--paper-dim);
    font-weight:600;
  }
  .sala-selector select{
    background:var(--panel-bg-2);
    border:1px solid var(--line-strong);
    color:var(--paper);
    border-radius:8px;
    padding:8px 12px;
    font-family:'Manrope',sans-serif;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    flex:1;
    min-width:160px;
  }
  .sala-selector select:focus-visible{outline:2px solid var(--amber);outline-offset:1px;}
  .capacidade-badge{
    font-size:12px;
    color:var(--paper-dimmer);
    background:var(--panel-bg-2);
    border:1px solid var(--line);
    padding:5px 10px;
    border-radius:6px;
    white-space:nowrap;
  }

  /* ---------- TIMELINE ---------- */
  .timeline-wrap{
    background:var(--panel-bg);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px 0 20px;
    overflow-x:auto;
  }
  .timeline{
    position:relative;
    margin:0 20px;
    width:max-content;
  }
  .hour-row{display:flex;}
  .hour-cell{
    width:var(--hour-w);
    flex:none;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--paper-dimmer);
    border-left:1px solid var(--line);
    padding-left:5px;
    padding-bottom:8px;
  }
  .hour-cell:first-child{border-left:none;}
  .track{
    position:relative;
    height:70px;
    border-top:1px solid var(--line);
  }
  .track-grid{
    position:absolute;inset:0;
    display:flex;
  }
  .track-grid div{
    width:var(--hour-w);
    flex:none;
    border-left:1px solid var(--line);
  }
  .now-line{
    position:absolute;
    top:-2px;bottom:0;
    width:2px;
    background:var(--amber);
    z-index:3;
  }
  .now-line::before{
    content:'';
    position:absolute;
    top:-5px;left:50%;
    transform:translateX(-50%);
    width:7px;height:7px;
    border-radius:50%;
    background:var(--amber);
  }
  .booking-block{
    position:absolute;
    top:6px;
    height:58px;
    background:var(--amber-soft);
    border:1px solid var(--amber);
    border-radius:8px;
    padding:5px 8px;
    overflow:hidden;
    z-index:2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:2px;
    min-width:60px;
  }
  .booking-block .b-time{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--amber);
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .booking-block .b-title{
    font-size:11px;
    color:var(--paper);
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* ---------- FORM ---------- */
  .panel{
    background:var(--panel-bg);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 22px 22px;
  }
  .panel h2{
    margin:0 0 16px;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--paper-dim);
    font-weight:700;
  }
  .row{
    display:flex;
    gap:14px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .row label{
    flex:1;
    min-width:140px;
    display:flex;
    flex-direction:column;
    gap:6px;
    font-size:12px;
    color:var(--paper-dim);
    font-weight:600;
  }
  .row input, .row select{
    background:var(--panel-bg-2);
    border:1px solid var(--line-strong);
    color:var(--paper);
    border-radius:8px;
    padding:10px 11px;
    font-family:'Manrope',sans-serif;
    font-size:14px;
  }
  .row input[type="time"]{font-family:'JetBrains Mono',monospace;}
  .row input:focus-visible, .row select:focus-visible{outline:2px solid var(--amber);outline-offset:1px;border-color:var(--amber);}
  button[type="submit"]{
    background:var(--amber);
    color:#1a1305;
    border:none;
    font-weight:700;
    font-size:14px;
    padding:11px 22px;
    border-radius:8px;
    cursor:pointer;
    transition:filter .15s, transform .1s;
  }
  button[type="submit"]:hover{filter:brightness(1.08);}
  button[type="submit"]:active{transform:scale(0.98);}
  button[type="submit"]:focus-visible{outline:2px solid var(--paper);outline-offset:2px;}
  button[type="submit"]:disabled{opacity:0.5;cursor:not-allowed;}

  .conflict-banner{
    margin-top:14px;
    background:var(--coral-soft);
    border:1px solid var(--coral);
    color:var(--paper);
    border-radius:8px;
    padding:12px 14px;
    font-size:13px;
    line-height:1.5;
  }
  .conflict-banner strong{color:var(--coral);}
  .success-banner{
    margin-top:14px;
    background:var(--mint-soft);
    border:1px solid var(--mint);
    color:var(--paper);
    border-radius:8px;
    padding:12px 14px;
    font-size:13px;
  }

  /* ---------- LIST ---------- */
  .bookings-list{
    list-style:none;
    margin:0;padding:0;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .bookings-list li{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--panel-bg-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
  }
  .li-time{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    font-weight:600;
    color:var(--amber);
    white-space:nowrap;
    width:96px;
    flex:none;
  }
  .li-info{flex:1;min-width:0;}
  .li-title{font-size:14px;font-weight:600;color:var(--paper);}
  .li-person{font-size:12px;color:var(--paper-dim);margin-top:2px;}
  .li-cancel{
    background:transparent;
    border:1px solid var(--line-strong);
    color:var(--paper-dim);
    font-size:12px;
    font-weight:600;
    padding:7px 12px;
    border-radius:7px;
    cursor:pointer;
    flex:none;
    transition:all .15s;
  }
  .li-cancel:hover{border-color:var(--coral);color:var(--coral);}
  .li-cancel.confirming{background:var(--coral);border-color:var(--coral);color:#fff;}
  .li-cancel:focus-visible{outline:2px solid var(--coral);outline-offset:2px;}
  .empty-state{
    color:var(--paper-dimmer);
    font-size:13px;
    padding:8px 2px;
  }

  .note{
    font-size:11px;
    color:var(--paper-dimmer);
    text-align:center;
    padding-top:4px;
  }

  /* Spinner de loading */
  .loading-spinner{
    display:inline-block;
    width:14px;height:14px;
    border:2px solid var(--line-strong);
    border-top-color:var(--amber);
    border-radius:50%;
    animation:spin .7s linear infinite;
    vertical-align:middle;
    margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (prefers-reduced-motion: reduce){
    .status-text.flap-anim{animation:none;}
    .loading-spinner{animation:none;}
  }
</style>
</head>
<body>

<div class="app">

  <header class="board-header">
    <div class="board-id">Sala de <span>Reunião</span></div>
    <div class="clock" id="clock">--:--:--</div>
  </header>

  <section class="status-hero">
    <div class="status-flap">
      <span class="status-text neutral" id="statusText">CARREGANDO</span>
    </div>
    <div class="status-detail" id="statusDetail"></div>
  </section>

  <!-- Seletor de sala -->
  <div class="sala-selector panel" style="flex-direction:row;gap:12px;padding:14px 18px;">
    <label for="roomSelect" style="font-size:13px;color:var(--paper-dim);font-weight:600;white-space:nowrap;">Sala:</label>
    <select id="roomSelect"></select>
    <span class="capacidade-badge" id="capacidadeBadge">—</span>
  </div>

  <nav class="day-nav">
    <button id="prevDay" aria-label="Dia anterior">‹</button>
    <div class="day-label" id="dayLabel">—</div>
    <button id="todayBtn">Hoje</button>
    <button id="nextDay" aria-label="Próximo dia">›</button>
  </nav>

  <section class="timeline-wrap">
    <div class="timeline" id="timeline"></div>
  </section>

  <section class="panel">
    <h2>Nova reserva</h2>
    <form id="bookingForm">
      <div class="row">
        <label>Seu login
          <input type="text" id="personInput" placeholder="Ex: marina.souza" required>
        </label>
        <label>Assunto
          <input type="text" id="titleInput" placeholder="Ex: Reunião de time" required>
        </label>
      </div>
      <div class="row">
        <label>Início
          <input type="time" id="startInput" required>
        </label>
        <label>Fim
          <input type="time" id="endInput" required>
        </label>
      </div>
      <button type="submit" id="submitBtn">Reservar horário</button>
    </form>
    <div class="conflict-banner" id="conflictBanner" hidden></div>
    <div class="success-banner" id="successBanner" hidden></div>
  </section>

  <section class="panel">
    <h2>Reservas do dia</h2>
    <ul class="bookings-list" id="bookingsList"></ul>
  </section>

  <p class="note">Conectado à API · <span id="apiStatus">verificando…</span></p>

</div>

<script>
(function(){
  // =========================================================
  //  CONFIGURAÇÃO — altere a URL se a API mudar de endereço
  // =========================================================
  const API_BASE = 'http://10.123.97.137:5087';

  const START_HOUR = 7;
  const END_HOUR   = 20;
  const HOUR_W     = 64;

  let currentDate = new Date();
  currentDate.setHours(0,0,0,0);

  let bookings  = [];   // reuniões do dia atual (já filtradas pela sala)
  let allRooms  = [];   // salas vindas da API
  let currentRoomId = null;
  let lastStatusKey = null;

  const $ = (id) => document.getElementById(id);
  const clockEl         = $('clock');
  const statusText      = $('statusText');
  const statusDetail    = $('statusDetail');
  const dayLabel        = $('dayLabel');
  const timelineEl      = $('timeline');
  const listEl          = $('bookingsList');
  const form            = $('bookingForm');
  const conflictBanner  = $('conflictBanner');
  const successBanner   = $('successBanner');
  const roomSelect      = $('roomSelect');
  const capacidadeBadge = $('capacidadeBadge');
  const apiStatus       = $('apiStatus');
  const submitBtn       = $('submitBtn');

  // ===================== HELPERS ===========================

  function pad(n){ return String(n).padStart(2,'0'); }

  function dateKey(d){
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function isSameDay(a,b){
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }

  // "08:30:00" ou "08:30" → minutos
  function toMinutes(t){
    const parts = t.split(':').map(Number);
    return parts[0]*60 + parts[1];
  }

  // "08:30:00" → "08:30"
  function fmtTime(t){ return t.slice(0,5); }

  function fmtRange(s,e){ return `${fmtTime(s)} – ${fmtTime(e)}`; }

  function formatDayLabel(d){
    return new Intl.DateTimeFormat('pt-BR',{weekday:'long',day:'2-digit',month:'long'}).format(d);
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ===================== API ===============================

  async function apiFetch(path, options={}){
    const res = await fetch(API_BASE + path, {
      headers:{ 'Content-Type':'application/json' },
      ...options
    });
    if(!res.ok){
      const msg = await res.text().catch(()=>'');
      throw new Error(msg || `HTTP ${res.status}`);
    }
    // 204 No Content não tem body
    if(res.status === 204) return null;
    return res.json();
  }

  async function fetchRooms(){
    return apiFetch('/api/rooms');
  }

  async function fetchMeetings(){
    return apiFetch('/api/meetings');
  }

  async function postMeeting(payload){
    return apiFetch('/api/meetings', {
      method:'POST',
      body: JSON.stringify(payload)
    });
  }

  async function deleteMeeting(id){
    return apiFetch(`/api/meetings/${id}`, { method:'DELETE' });
  }

  // ===================== SALAS =============================

  async function loadRooms(){
    try{
      allRooms = await fetchRooms();
      roomSelect.innerHTML = allRooms.map(r =>
        `<option value="${r.id}">${escapeHtml(r.name)}</option>`
      ).join('');
      if(allRooms.length > 0){
        currentRoomId = allRooms[0].id;
        updateCapacidadeBadge();
      }
    } catch(err){
      roomSelect.innerHTML = '<option value="">Erro ao carregar salas</option>';
      apiStatus.textContent = '⚠ API offline — certifique-se que o backend está rodando';
      apiStatus.style.color = 'var(--coral)';
      console.error('Erro ao buscar salas:', err);
    }
  }

  function updateCapacidadeBadge(){
    const room = allRooms.find(r => r.id == currentRoomId);
    capacidadeBadge.textContent = room ? `Capacidade: ${room.capacity} pessoas` : '—';
  }

  roomSelect.addEventListener('change', async ()=>{
    currentRoomId = parseInt(roomSelect.value);
    updateCapacidadeBadge();
    await refreshBookings();
    renderAll();
  });

  // ===================== REUNIÕES ==========================

  async function refreshBookings(){
    try{
      const all = await fetchMeetings();
      const key = dateKey(currentDate);

      // Filtra pela sala selecionada e pelo dia visualizado
      bookings = all.filter(m => {
        const sameRoom = m.roomId === currentRoomId || (m.room && m.room.id === currentRoomId);
        const sameDay  = m.meetingDate === key;
        return sameRoom && sameDay;
      });

      apiStatus.textContent = 'conectado ✓';
      apiStatus.style.color = 'var(--mint)';
    } catch(err){
      apiStatus.textContent = '⚠ Erro ao buscar reuniões';
      apiStatus.style.color = 'var(--coral)';
      console.error('Erro ao buscar reuniões:', err);
    }
  }

  // ===================== RENDER ============================

  function renderClock(){
    const now = new Date();
    clockEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  }

  function renderStatus(){
    const today = new Date(); today.setHours(0,0,0,0);
    const viewingToday = isSameDay(currentDate, today);

    if(!viewingToday){
      setStatus('neutral', currentDate < today ? 'DIA PASSADO' : 'DIA FUTURO');
      statusDetail.innerHTML = `Visualizando <strong>${formatDayLabel(currentDate)}</strong>`;
      return;
    }

    const now    = new Date();
    const nowMin = now.getHours()*60 + now.getMinutes();
    const active = bookings.find(b => toMinutes(b.startTime) <= nowMin && nowMin < toMinutes(b.endTime));

    if(active){
      setStatus('occupied','OCUPADA');
      statusDetail.innerHTML = `<strong>${escapeHtml(active.title)}</strong><br>${escapeHtml(active.createdByLogin)} · até ${fmtTime(active.endTime)}`;
    } else {
      const next = [...bookings]
        .filter(b => toMinutes(b.startTime) > nowMin)
        .sort((a,b)=> toMinutes(a.startTime)-toMinutes(b.startTime))[0];
      setStatus('free','LIVRE');
      statusDetail.innerHTML = next
        ? `Próxima reserva às <strong>${fmtTime(next.startTime)}</strong><br>${escapeHtml(next.title)}`
        : 'Nenhuma reserva pendente hoje';
    }
  }

  function setStatus(kind, text){
    const key = kind+text;
    statusText.className = 'status-text '+kind;
    statusText.textContent = text;
    if(key !== lastStatusKey){
      statusText.classList.remove('flap-anim');
      void statusText.offsetWidth;
      statusText.classList.add('flap-anim');
      lastStatusKey = key;
    }
  }

  function renderTimeline(){
    const totalHours = END_HOUR - START_HOUR;
    let hourCells = '';
    for(let h=START_HOUR; h<=END_HOUR; h++){
      hourCells += `<div class="hour-cell" style="width:${HOUR_W}px">${pad(h)}h</div>`;
    }
    let gridCells = '';
    for(let h=0; h<totalHours; h++) gridCells += `<div></div>`;

    const trackWidth = totalHours * HOUR_W;

    let blocksHtml = '';
    bookings.forEach(b=>{
      const s = Math.max(toMinutes(b.startTime), START_HOUR*60);
      const e = Math.min(toMinutes(b.endTime),   END_HOUR*60);
      if(e<=s) return;
      const left  = ((s - START_HOUR*60)/60)*HOUR_W;
      const width = ((e-s)/60)*HOUR_W;
      blocksHtml += `<div class="booking-block" style="left:${left}px;width:${Math.max(width-3,20)}px">
        <span class="b-time">${fmtTime(b.startTime)}–${fmtTime(b.endTime)}</span>
        <span class="b-title">${escapeHtml(b.title)}</span>
      </div>`;
    });

    let nowLineHtml = '';
    const today = new Date(); today.setHours(0,0,0,0);
    if(isSameDay(currentDate, today)){
      const now    = new Date();
      const nowMin = now.getHours()*60+now.getMinutes();
      if(nowMin >= START_HOUR*60 && nowMin <= END_HOUR*60){
        const left = ((nowMin-START_HOUR*60)/60)*HOUR_W;
        nowLineHtml = `<div class="now-line" style="left:${left}px"></div>`;
      }
    }

    timelineEl.innerHTML = `
      <div class="hour-row" style="width:${trackWidth}px">${hourCells}</div>
      <div class="track" style="width:${trackWidth}px">
        <div class="track-grid">${gridCells}</div>
        ${blocksHtml}
        ${nowLineHtml}
      </div>
    `;
  }

  function renderList(){
    if(bookings.length === 0){
      listEl.innerHTML = `<li class="empty-state" style="border:none;background:none;padding:4px 2px;">Nenhuma reserva para este dia ainda.</li>`;
      return;
    }
    const sorted = [...bookings].sort((a,b)=>toMinutes(a.startTime)-toMinutes(b.startTime));
    listEl.innerHTML = sorted.map(b => `
      <li data-id="${b.id}">
        <span class="li-time">${fmtRange(b.startTime,b.endTime)}</span>
        <span class="li-info">
          <div class="li-title">${escapeHtml(b.title)}</div>
          <div class="li-person">${escapeHtml(b.createdByLogin)}</div>
        </span>
        <button class="li-cancel" data-id="${b.id}">Cancelar</button>
      </li>
    `).join('');
  }

  function renderDayLabel(){
    dayLabel.textContent = formatDayLabel(currentDate);
  }

  function renderAll(){
    renderDayLabel();
    renderTimeline();
    renderList();
    renderStatus();
  }

  // ===================== NAVEGAR DIA =======================

  async function switchDay(offsetDays){
    currentDate.setDate(currentDate.getDate()+offsetDays);
    currentDate = new Date(currentDate);
    hideBanners();
    await refreshBookings();
    renderAll();
  }

  function hideBanners(){
    conflictBanner.hidden = true;
    successBanner.hidden  = true;
  }

  $('prevDay').addEventListener('click', ()=>switchDay(-1));
  $('nextDay').addEventListener('click', ()=>switchDay(1));
  $('todayBtn').addEventListener('click', async ()=>{
    currentDate = new Date(); currentDate.setHours(0,0,0,0);
    hideBanners();
    await refreshBookings();
    renderAll();
  });

  // ===================== FORMULÁRIO ========================

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    hideBanners();

    const person = $('personInput').value.trim();
    const title  = $('titleInput').value.trim();
    const start  = $('startInput').value;   // "HH:MM"
    const end    = $('endInput').value;     // "HH:MM"

    if(!person || !title || !start || !end) return;
    if(!currentRoomId){
      conflictBanner.hidden = false;
      conflictBanner.innerHTML = `<strong>Selecione uma sala</strong> antes de reservar.`;
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = `<span class="loading-spinner"></span> Reservando…`;

    // Payload exato que a API espera
    const payload = {
      title:          title,
      meetingDate:    dateKey(currentDate),   // "YYYY-MM-DD"
      startTime:      start + ':00',          // "HH:MM:00"
      endTime:        end   + ':00',          // "HH:MM:00"
      roomId:         currentRoomId,
      createdByLogin: person
    };

    try{
      await postMeeting(payload);
      await refreshBookings();
      successBanner.hidden = false;
      successBanner.textContent = `Reservado: ${start}–${end} para "${title}".`;
      form.reset();
      renderAll();
    } catch(err){
      conflictBanner.hidden = false;
      // A API retorna a mensagem de conflito diretamente como string
      conflictBanner.innerHTML = `<strong>Não foi possível reservar.</strong><br>${escapeHtml(err.message)}`;
    } finally{
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reservar horário';
    }
  });

  // ===================== CANCELAR ==========================

  listEl.addEventListener('click', async (e)=>{
    const btn = e.target.closest('.li-cancel');
    if(!btn) return;
    const id = parseInt(btn.dataset.id);

    if(!btn.classList.contains('confirming')){
      btn.classList.add('confirming');
      btn.textContent = 'Confirmar?';
      setTimeout(()=>{
        if(btn.isConnected && btn.classList.contains('confirming')){
          btn.classList.remove('confirming');
          btn.textContent = 'Cancelar';
        }
      }, 3000);
      return;
    }

    btn.textContent = '…';
    btn.disabled = true;
    try{
      await deleteMeeting(id);
      await refreshBookings();
      hideBanners();
      renderAll();
    } catch(err){
      conflictBanner.hidden = false;
      conflictBanner.innerHTML = `<strong>Erro ao cancelar.</strong> ${escapeHtml(err.message)}`;
      btn.disabled = false;
      btn.textContent = 'Cancelar';
    }
  });

  // ===================== BOOT ==============================

  (async function init(){
    renderClock();
    setInterval(renderClock, 1000);

    await loadRooms();
    await refreshBookings();
    renderAll();

    // Atualiza a cada 30s para capturar reservas de outras pessoas
    setInterval(async ()=>{
      await refreshBookings();
      renderStatus();
      renderTimeline();
      renderList();
    }, 30000);
  })();

})();
</script>

</body>
</html>
